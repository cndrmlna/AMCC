<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Halaman Daftar</title>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1 class="title">AMCC DAFTAR</h1>
      <p class="subtitle">Buat Akun Baru Anda</p>
      <form action="#" method="POST">  

        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan Nama Lengkap Anda" required>  
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Masukkan email Anda" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Masukkan password Anda" required>
        </div>

        <div class="form-group">
          <label for="confirm_password">Konfirmasi Password</label> 
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Konfirmasi password Anda" required>
        </div>

        <div class="form-options">
          <label class="remember-me"> 
            <input type="checkbox" name="agree" required> 
            Saya setuju dengan kebijakan
          </label>
        </div>

        <button type="submit" class="login-btn">Daftar</button>
      </form>

      <div class="signup-link">
        Sudah Punya Akun <a href="index.html">Login disini</a>
      </div>
    </div>
  </div>
</body>
</html>
